<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>shogi-db</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>shogi-db</h1>
          <p>対局一覧</p>
        </div>
        <button class="icon-button" id="refreshButton" type="button" aria-label="再読み込み" title="再読み込み">
          ↻
        </button>
      </header>

      <section class="toolbar" aria-label="対局一覧の操作">
        <label class="search-field">
          <span>検索</span>
          <input id="searchInput" type="search" autocomplete="off" placeholder="先手・後手・勝敗" />
        </label>
        <div class="summary" id="summaryText">0局</div>
      </section>

      <section class="status-panel" id="statusPanel" hidden></section>

      <section class="game-table-shell" aria-label="保存済み対局">
        <table class="game-table">
          <thead>
            <tr>
              <th>対局日時</th>
              <th>先手</th>
              <th>後手</th>
              <th>勝敗</th>
              <th>手数</th>
            </tr>
          </thead>
          <tbody id="gameRows"></tbody>
        </table>
      </section>
    </main>
    <script src="/assets/app.js" defer></script>
  </body>
</html>
