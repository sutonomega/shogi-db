<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>shogi-db</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <button class="back-link" id="backButton" type="button" hidden>← 対局一覧</button>
        <div>
          <h1>shogi-db</h1>
          <p id="pageSubtitle">対局一覧</p>
        </div>
        <button class="icon-button" id="refreshButton" type="button" aria-label="再読み込み" title="再読み込み">
          ↻
        </button>
      </header>

      <section class="toolbar" id="listToolbar" aria-label="対局一覧の操作">
        <label class="search-field">
          <span>検索</span>
          <input id="searchInput" type="search" autocomplete="off" placeholder="先手・後手・勝敗" />
        </label>
        <form class="import-form" id="importForm" aria-label="KIFファイル取込">
          <input id="kifFileInput" type="file" accept=".kif,text/plain,application/octet-stream" />
          <label class="file-picker" for="kifFileInput">KIF選択</label>
          <span id="importFileName">未選択</span>
          <button id="importButton" type="submit" disabled>取り込み</button>
        </form>
        <form class="directory-import-form" id="directoryImportForm" aria-label="KIFフォルダ一括取込">
          <input id="directoryPathInput" type="text" autocomplete="off" placeholder="/data/share/2mkif" />
          <label class="checkbox-field">
            <input id="recursiveImportInput" type="checkbox" />
            <span>再帰</span>
          </label>
          <button id="directoryImportButton" type="submit">一括取込</button>
          <button id="cancelDirectoryImportButton" type="button" hidden>キャンセル</button>
        </form>
        <div class="summary" id="summaryText">0局</div>
      </section>

      <section class="status-panel" id="statusPanel" hidden></section>

      <section class="stats-panel" id="strategyStatsPanel" aria-label="戦法別集計">
        <div class="panel-heading">
          <h2>戦法別集計</h2>
          <span id="strategyStatsSummary">0件</span>
        </div>
        <div class="stats-list" id="strategyStatsList"></div>
      </section>

      <section class="stats-panel" id="enclosureStatsPanel" aria-label="囲い別集計">
        <div class="panel-heading">
          <h2>囲い別集計</h2>
          <span id="enclosureStatsSummary">0件</span>
        </div>
        <div class="stats-list" id="enclosureStatsList"></div>
      </section>

      <section class="stats-panel" id="blunderPanel" aria-label="悪手ランキング">
        <div class="panel-heading">
          <h2>悪手ランキング</h2>
          <span id="blunderSummary">0件</span>
        </div>
        <div class="stats-list" id="blunderList"></div>
      </section>

      <section class="game-table-shell" id="gameListView" aria-label="保存済み対局">
        <table class="game-table">
          <thead>
            <tr>
              <th>対局日時</th>
              <th>先手</th>
              <th>後手</th>
              <th>勝敗</th>
              <th>手数</th>
            </tr>
          </thead>
          <tbody id="gameRows"></tbody>
        </table>
      </section>

      <section class="viewer-shell" id="viewerView" hidden>
        <section class="board-column" aria-label="盤面">
          <div class="hands opponent">
            <span>後手持ち駒</span>
            <strong id="whiteHand">なし</strong>
          </div>
          <div class="board-frame">
            <div class="file-labels" aria-hidden="true">
              <span>９</span><span>８</span><span>７</span><span>６</span><span>５</span><span>４</span><span>３</span><span>２</span><span>１</span>
            </div>
            <div class="board-grid" id="boardGrid" aria-label="将棋盤"></div>
          </div>
          <div class="hands player">
            <span>先手持ち駒</span>
            <strong id="blackHand">なし</strong>
          </div>
          <div class="move-controls">
            <button type="button" id="firstMoveButton" title="最初へ">|←</button>
            <button type="button" id="prevMoveButton" title="1手戻る">←</button>
            <span id="moveCounter">0 / 0</span>
            <button type="button" id="nextMoveButton" title="1手進む">→</button>
            <button type="button" id="lastMoveButton" title="最後へ">→|</button>
            <input class="move-slider" id="moveSlider" type="range" min="0" max="0" value="0" aria-label="手番" />
          </div>
        </section>
        <aside class="position-panel" aria-label="局面情報">
          <h2 id="viewerTitle">対局</h2>
          <section class="eval-panel" aria-label="評価値グラフ">
            <div class="panel-heading">
              <h3>評価値グラフ</h3>
              <span id="evalSummary">評価値なし</span>
            </div>
            <svg class="eval-graph" id="evalGraph" viewBox="0 0 640 220" role="img" aria-label="先手視点の評価値推移"></svg>
            <p class="eval-empty" id="evalGraphStatus">解析データなし</p>
          </section>
          <section class="move-frequency-panel" aria-label="指し手頻度">
            <div class="panel-heading">
              <h3>指し手頻度</h3>
              <span id="moveFrequencySummary">0件</span>
            </div>
            <div class="move-frequency-list" id="moveFrequencyList"></div>
          </section>
          <section class="opening-panel" aria-label="自分専用定跡">
            <div class="panel-heading">
              <h3>自分専用定跡</h3>
              <span id="openingSummary">0回</span>
            </div>
            <div class="opening-list" id="openingList"></div>
          </section>
          <dl>
            <div>
              <dt>手番</dt>
              <dd id="positionMoveNumber">0手目</dd>
            </div>
            <div>
              <dt>指し手</dt>
              <dd id="positionMove">開始局面</dd>
            </div>
            <div>
              <dt>評価値</dt>
              <dd id="positionEval">なし</dd>
            </div>
            <div>
              <dt>SFEN</dt>
              <dd class="sfen-text" id="positionSfen"></dd>
            </div>
          </dl>
        </aside>
      </section>
    </main>
    <script src="/assets/app.js" defer></script>
  </body>
</html>
